<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --x-color: #4fc3f7;
    --o-color: #ff8a65;
    --win-bg: rgba(233, 69, 96, 0.25);
    --cell-size: 120px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  #status {
    font-size: 1.2rem;
    margin-bottom: 1.5rem;
    min-height: 1.5em;
    color: var(--muted);
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, var(--cell-size));
    grid-template-rows: repeat(3, var(--cell-size));
    gap: 6px;
    margin-bottom: 1.5rem;
  }
  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .cell:hover:not(.taken):not(.game-over) {
    background: var(--border);
    transform: scale(1.04);
  }
  .cell.taken, .cell.game-over { cursor: default; }
  .cell.win-cell { background: var(--win-bg); border-color: var(--accent); }
  .cell[data-marker="X"] { color: var(--x-color); }
  .cell[data-marker="O"] { color: var(--o-color); }

  #controls { margin-bottom: 1.5rem; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.7rem 1.5rem;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }

  #log-container {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    max-height: 200px;
    overflow-y: auto;
  }
  #log-container h3 { margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--muted); }
  #log { font-size: 0.85rem; line-height: 1.6; }
  #log div { border-bottom: 1px solid var(--border); padding: 2px 0; }
  #log div:last-child { border-bottom: none; }

  @media (max-width: 500px) {
    :root { --cell-size: 90px; }
    .cell { font-size: 2.2rem; }
  }
</style>
</head>
<body>
<h1>Tic Tac Toe</h1>
<div id="status">Loading...</div>
<div id="board"></div>
<div id="controls">
  <button id="new-game-btn">New Game</button>
</div>
<div id="log-container">
  <h3>Game Log</h3>
  <div id="log"></div>
</div>

<script>
(function () {
  const POLL_INTERVAL_MS = 1500;
  const MY_PLAYER = "p1";
  const PHASE_END = "END_GAME";
  const boardEl = document.getElementById("board");
  const statusEl = document.getElementById("status");
  const logEl = document.getElementById("log");
  const newGameBtn = document.getElementById("new-game-btn");

  let currentState = null;
  let polling = null;

  /* --- Rendering --- */

  function render(state) {
    currentState = state;
    renderBoard(state);
    renderStatus(state);
    renderLog(state.log);
  }

  function renderBoard(state) {
    boardEl.innerHTML = "";
    const isGameOver = state.phase === PHASE_END;
    const winSet = buildWinSet(state.winLine);

    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        const val = state.board[r][c];
        if (val) {
          const marker = val === MY_PLAYER ? state.myMarker : state.opponentMarker;
          cell.textContent = marker;
          cell.dataset.marker = marker;
          cell.classList.add("taken");
        }
        if (isGameOver) cell.classList.add("game-over");
        if (winSet.has(r + "," + c)) cell.classList.add("win-cell");
        cell.addEventListener("click", () => onCellClick(r, c));
        boardEl.appendChild(cell);
      }
    }
  }

  function buildWinSet(winLine) {
    const set = new Set();
    if (winLine) winLine.forEach(([r, c]) => set.add(r + "," + c));
    return set;
  }

  function renderStatus(state) {
    if (state.phase === PHASE_END) {
      if (state.winner) {
        const marker = state.winner === MY_PLAYER ? state.myMarker : state.opponentMarker;
        const who = state.winner === MY_PLAYER ? "You win" : "Opponent wins";
        statusEl.textContent = who + " (" + marker + ")!";
      } else {
        statusEl.textContent = "It's a draw!";
      }
      stopPolling();
      return;
    }
    if (state.currentPlayer === MY_PLAYER) {
      statusEl.textContent = "Your turn (" + state.myMarker + ")";
    } else {
      statusEl.textContent = "Waiting for opponent...";
    }
  }

  function renderLog(log) {
    logEl.innerHTML = log.map(function (msg) {
      return "<div>" + escapeHtml(msg) + "</div>";
    }).join("");
    logEl.scrollTop = logEl.scrollHeight;
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  /* --- API --- */

  function fetchState() {
    return fetch("/api/state?player=" + MY_PLAYER)
      .then(function (r) { return r.json(); })
      .then(render)
      .catch(function (err) { console.error("Poll error:", err); });
  }

  function postAction(body) {
    return fetch("/api/action", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.state) render(data.state);
      if (data.error) statusEl.textContent = "Error: " + data.error;
      return data;
    });
  }

  /* --- Events --- */

  function onCellClick(row, col) {
    if (!currentState) return;
    if (currentState.phase === PHASE_END) return;
    if (currentState.currentPlayer !== MY_PLAYER) return;
    if (currentState.board[row][col] !== null) return;
    postAction({ player: MY_PLAYER, action: "move", row: row, col: col });
  }

  newGameBtn.addEventListener("click", function () {
    postAction({ action: "new-game" }).then(function () {
      startPolling();
    });
  });

  /* --- Polling --- */

  function startPolling() {
    stopPolling();
    polling = setInterval(fetchState, POLL_INTERVAL_MS);
  }

  function stopPolling() {
    if (polling) { clearInterval(polling); polling = null; }
  }

  /* --- Init --- */
  fetchState().then(startPolling);
})();
</script>
</body>
</html>
